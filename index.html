function normTxt(s){ return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9 ]/g," ").replace(/\s+/g," ").trim(); }
function toks(s){ return normTxt(s).split(" ").filter(function(w){return w.length>2;}); }
function simil(a,b){ var A=new Set(toks(a)), B=new Set(toks(b)); if(!A.size||!B.size)return 0; var c=0; A.forEach(function(w){if(B.has(w))c++;}); return c/Math.max(A.size,B.size); }

const bizKey=r=>`${(r.s||"").trim()}||${r.f||""}||${(r.c||"").trim()}`;
function planImport(incoming,stored){
  const avail={}; stored.forEach(r=>{ (avail[bizKey(r)]=avail[bizKey(r)]||[]).push({...r}); });
  const incByKey={}; incoming.forEach(r=>{ (incByKey[bizKey(r)]=incByKey[bizKey(r)]||[]).push(r); });
  const nuevas=[],modificadas=[]; let identicas=0;
  Object.keys(incByKey).forEach(k=>{ const inc=incByKey[k]; const st=(avail[k]||[]).slice(); const rem=[];
    inc.forEach(ir=>{ const idx=st.findIndex(sr=>Math.round(sr.n)===Math.round(ir.n)&&Math.round(sr.b)===Math.round(ir.b));
      if(idx>=0){identicas++;st.splice(idx,1);} else rem.push(ir); });
    let i=0; while(i<rem.length&&st.length>0){ const sr=st.shift(); modificadas.push({id:sr.id,s:sr.s,f:sr.f,c:sr.c,oldN:sr.n,oldB:sr.b,newN:rem[i].n,newB:rem[i].b}); i++; }
    for(;i<rem.length;i++) nuevas.push(rem[i]);
  });
  return {nuevas,modificadas,identicas};
}
function sumBy(rows,fn){ const o={}; rows.forEach(r=>{ const k=fn(r); if(k==null)return; (o[k]=o[k]||{neto:0,bruto:0,n:0}); o[k].neto+=r.n||0;o[k].bruto+=r.b||0;o[k].n++; }); return o; }

function BarList({data,highlight=0,altColor=C.navy}){
  const max=Math.max(1,...data.map(d=>d.value));

      </div>))}

}
function LineSVG({data,domain,fmtY,color=C.navy,avg}){
  const W=640,H=200,pl=42,pr=12,pt=12,pb=42;
  const n=data.length; if(n===0)return <div className="t11" style={{color:C.grey,padding:20}}>Sin datos.</div>;
  const ys=data.map(d=>d.v);
  const yMin=domain?domain[0]:Math.min(...ys)*0.95, yMax=domain?domain[1]:Math.max(...ys)*1.05||1;
  const X=i=> pl+(n<=1?0:(i*(W-pl-pr)/(n-1)));
  const Y=v=> pt+(1-(v-yMin)/(yMax-yMin||1))*(H-pt-pb);
  const path=data.map((d,i)=>`${i?"L":"M"}${X(i).toFixed(1)} ${Y(d.v).toFixed(1)}`).join(" ");
  const ticks=4; const tv=Array.from({length:ticks+1},(_,i)=>yMin+i*(yMax-yMin)/ticks);
  const step=Math.max(1,Math.ceil(n/14));
  return <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{maxHeight:230}}>
    {tv.map((v,i)=>(<g key={i}><line x1={pl} x2={W-pr} y1={Y(v)} y2={Y(v)} stroke={C.line}/>
      <text x={pl-4} y={Y(v)+3} textAnchor="end" fontSize="9" fill={C.grey}>{fmtY?fmtY(v):mmv(v)}</text></g>))}
    {avg!=null&&<line x1={pl} x2={W-pr} y1={Y(avg)} y2={Y(avg)} stroke={C.orange} strokeDasharray="4 3"/>}
    <path d={path} fill="none" stroke={color} strokeWidth="2"/>
    {data.map((d,i)=><circle key={i} cx={X(i)} cy={Y(d.v)} r="2.4" fill={C.orange}/>)}
    {data.map((d,i)=> i%step===0 ? <text key={i} x={X(i)} y={H-pb+14} textAnchor="end" fontSize="8" fill={C.grey}
      transform={`rotate(-90 ${X(i)} ${H-pb+14})`}>{d.name}</text> : null)}
  </svg>;
}

  <label className="row gap1 t12" style={{color:C.grey}}>

function OcupTab({rows,cap,setCap}){

    galp.forEach(r=>{ (cnt[r.anio]=cnt[r.anio]||{}); (val[r.anio]=val[r.anio]||{});

    const prom=all.length?all.reduce((a,x)=>a+x.occ,0)/all.length:0; const last=all[all.length-1]||null;
    return {cnt,val,anios,mx:mx.occ>=0?mx:null,prom,last,sug}; },[galp,cap]);
  const line=useMemo(()=>{ const a=[]; D.anios.forEach(y=>{for(let m=1;m<=12;m++){const c=(D.cnt[y]&&D.cnt[y][m])||0;if(c>0)a.push({name:`${y}-${String(m).padStart(2,"0")}`,v:Math.round(c/cap*1000)/10});}}); return a; },[D,cap]);

/* ===================== TAB Resto ===================== */
function RestoTab({rows}){
  const resto=useMemo(()=>rows.filter(r=>r.direccion!==CONDO),[rows]);
  const dated=useMemo(()=>resto.filter(r=>r.ym),[resto]);
  const meses=useMemo(()=>[...new Set(dated.map(r=>r.ym))].sort().slice(-12),[dated]);
  const dirs=useMemo(()=>{ const o={}; resto.forEach(r=>{ (o[r.direccion]=o[r.direccion]||{neto:0,byMes:{}}); o[r.direccion].neto+=r.n||0; if(r.ym)o[r.direccion].byMes[r.ym]=(o[r.direccion].byMes[r.ym]||0)+(r.n||0); });
    return Object.entries(o).sort((a,b)=>b[1].neto-a[1].neto); },[resto]);
  const totNeto=resto.reduce((a,r)=>a+(r.n||0),0);
  const mesTot=useMemo(()=>meses.map(ym=>({name:ym.slice(2),ym,v:dated.filter(r=>r.ym===ym).reduce((a,r)=>a+(r.n||0),0)})),[meses,dated]);
  const varMoM=mesTot.length>=2?(mesTot[mesTot.length-1].v-mesTot[mesTot.length-2].v)/(mesTot[mesTot.length-2].v||1)*100:0;

/* ===================== TAB Importación ===================== */
function ImportTab({raw,enriched,setRows,notify,mode}){
  const fileRef=useRef(null);

  const fechas=enriched.filter(r=>r.f).map(r=>r.f).sort();
  const rango=fechas.length?`${fechas[0]} a ${fechas[fechas.length-1]}`:"—";
  const onFile=async e=>{ const file=e.target.files&&e.target.files[0]; if(!file)return; setBusy(true);
    try{ const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array",cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]]; const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let hi=0; for(let i=0;i<Math.min(arr.length,8);i++){ const j=arr[i].map(x=>String(x).toLowerCase()).join(" "); if(j.includes("neto")||j.includes("servicio")||j.includes("cliente")){hi=i;break;} }
      const heads=arr[hi].map(x=>String(x).toLowerCase().trim());
      const find=(...ks)=>heads.findIndex(h=>ks.some(k=>h.includes(k)));
      const iS=find("servicio","glosa","detalle","concepto"),iN=find("neto"),iB=find("bruto","con iva"),iF=find("fecha"),iC=find("cliente","razon","razón");
      if(iS<0||iN<0||iC<0){ notify("No se reconocen las columnas. Usa la plantilla tipo.","err"); setBusy(false); return; }
      const inc=[];
      for(let i=hi+1;i<arr.length;i++){ const r=arr[i]; if(!r||r.every(x=>x===""||x==null))continue;
        const s=r[iS],c=r[iC]; if((s===""||s==null)&&(c===""||c==null))continue;
        inc.push({s:s==null?"":String(s).trim(),n:parseNum(r[iN]),b:iB>=0?parseNum(r[iB]):parseNum(r[iN]),f:iF>=0?normFecha(r[iF]):null,c:c==null?"":String(c).trim()}); }
      const p=planImport(inc,raw); const ac={}; p.modificadas.forEach(m=>ac[m.id]=true); setAccept(ac);
      setPlan({...p,fileName:file.name,total:inc.length});
    }catch(err){ notify("Error al leer el archivo: "+err.message,"err"); }
    setBusy(false); if(fileRef.current)fileRef.current.value="";

  const confirmar=async()=>{ if(!plan)return; let maxId=raw.reduce((a,r)=>Math.max(a,r.id||0),0);
    const nuevas=plan.nuevas.map(x=>({id:++maxId,s:x.s,n:x.n,b:x.b,f:x.f,c:x.c}));
    const modMap={}; plan.modificadas.forEach(m=>{ if(accept[m.id])modMap[m.id]={n:m.newN,b:m.newB}; });
    const next=raw.map(r=>modMap[r.id]?{...r,...modMap[r.id]}:r).concat(nuevas);
    await setRows(next); const nMod=Object.keys(modMap).length;
    notify(`Importado: ${nuevas.length} nuevas, ${nMod} actualizadas, ${plan.identicas} idénticas ignoradas.`);
    setPlan(null); setAccept({}); };
  const plantilla=()=>{ const aoa=[["Servicio","Total Neto","Total Bruto","Fecha de factura","Cliente"],
    ["[ARRIENDO DE GALPONES HUECHURABA] CORRESPONDIENTE A GALPON, PERIODO DEL ...",3200000,3808000,"2026-07-01","EJEMPLO CLIENTE SPA"],
    ["[GASTOS COMUNES GALPONES HUECHURABA] PERIODO ...",180000,180000,"","EJEMPLO CLIENTE SPA"]];
    const ws=XLSX.utils.aoa_to_sheet(aoa); ws["!cols"]=[{wch:60},{wch:14},{wch:14},{wch:16},{wch:28}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"facturacion"); XLSX.writeFile(wb,"plantilla_facturacion.xlsx"); };
  const clearAll=async()=>{ await setRows([]); setClr(false); notify("Datos eliminados."); };
  const respaldo=()=>{ if(raw.length===0){ notify("No hay datos para respaldar.","err"); return; }
    const aoa=[["Servicio","Total Neto","Total Bruto","Fecha de factura","Cliente"]];
    raw.forEach(r=>aoa.push([r.s,r.n,r.b,r.f||"",r.c]));
    const ws=XLSX.utils.aoa_to_sheet(aoa); ws["!cols"]=[{wch:60},{wch:14},{wch:14},{wch:16},{wch:28}];
    const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"respaldo");
    const hoy=new Date().toISOString().slice(0,10);
    XLSX.writeFile(wb,`respaldo_facturacion_${hoy}.xlsx`); notify("Respaldo descargado."); };
  return (

        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{display:"none"}}/>
        <div className="row wrap gap2">
          <button className="btn" disabled={busy} onClick={()=>fileRef.current&&fileRef.current.click()} style={{background:C.orange,color:"#fff",padding:"9px 16px",fontSize:13}}>{busy?<IRefresh className="spin"/>:<IUp/>} Elegir archivo</button>
          <button className="btn" onClick={plantilla} style={{background:C.lgrey,color:C.navy,padding:"9px 16px",fontSize:13}}><IDown/> Descargar plantilla tipo</button>
        </div>
      </div>
      <div className="card">
        <STitle icon={IDb}>Datos guardados</STitle>
        <div className="grid g2">
          <Chip label="Documentos" value={numCL(raw.length)}/>
          <Chip label="Fechas" value={numCL(fechas.length)} sub={rango} color={C.lblue}/>
        </div>
        <div className="t10" style={{color:C.grey,marginTop:8}}>Almacenamiento: {mode}</div>
        <div style={{marginTop:8}}>
          {!clr?<button className="btn t12" disabled={raw.length===0} onClick={()=>setClr(true)} style={{background:"#fff",color:C.red,border:`1px solid ${C.line}`,padding:"6px 12px"}}><ITrash size={14}/> Vaciar todos los datos</button>
           :<div className="row gap2 t12"><span style={{color:C.red}}>¿Eliminar todo de forma permanente?</span>
              <button className="btn" onClick={clearAll} style={{background:C.red,color:"#fff",padding:"4px 12px"}}>Sí, vaciar</button>
              <button className="btn" onClick={()=>setClr(false)} style={{background:C.lgrey,color:C.ink,padding:"4px 12px"}}>Cancelar</button></div>}
        </div>
      </div>
    </div>

    {plan&&<div className="card">
      <STitle icon={IRefresh}>Revisión de importación · {plan.fileName}</STitle>
      <div className="grid g3" style={{marginBottom:16}}>
        <Chip label="Nuevas" value={numCL(plan.nuevas.length)} sub="se agregarán" color={C.green}/>
        <Chip label="Con cambios" value={numCL(plan.modificadas.length)} sub="requieren tu ok" color={C.amber}/>
        <Chip label="Idénticas" value={numCL(plan.identicas)} sub="se ignoran" color={C.grey}/>
      </div>
      {plan.modificadas.length>0&&<div style={{marginBottom:16}}>
        <div className="row" style={{justifyContent:"space-between",marginBottom:4}}>
          <div className="bold t12" style={{color:C.ink}}>Líneas que cambiaron de monto</div>
          <div className="row gap2 t11">
            <button className="btn" onClick={()=>{const a={};plan.modificadas.forEach(m=>a[m.id]=true);setAccept(a);}} style={{background:C.lgrey,color:C.greenD,padding:"4px 8px"}}>Aceptar todas</button>
            <button className="btn" onClick={()=>setAccept({})} style={{background:C.lgrey,color:C.red,padding:"4px 8px"}}>Rechazar todas</button>
          </div>
        </div>
        <div className="ovx" style={{maxHeight:260,overflowY:"auto"}}><table className="t11">
          <thead><tr style={{background:C.navy,color:"#fff"}}><th>Aceptar</th><th style={{textAlign:"left"}}>Cliente</th><th style={{textAlign:"left"}}>Servicio</th><th>Fecha</th><th style={{textAlign:"right"}}>Neto antes → después</th></tr></thead>
          <tbody>{plan.modificadas.map((m,i)=>(
            <tr key={m.id} style={{background:i%2?"#fff":C.lgrey}}>
              <td style={{textAlign:"center"}}><input type="checkbox" checked={!!accept[m.id]} onChange={e=>setAccept(a=>({...a,[m.id]:e.target.checked}))}/></td>
              <td>{m.c}</td><td className="truncate" style={{maxWidth:240}}>{conceptoDe(m.s)}</td><td style={{textAlign:"center"}}>{m.f||"—"}</td>
              <td style={{textAlign:"right"}}><span style={{color:C.grey}}>{clp(m.oldN)}</span><span style={{color:C.orange}}> → {clp(m.newN)}</span>
                <span className="t10" style={{marginLeft:4,color:m.newN>=m.oldN?C.green:C.red}}>({m.newN>=m.oldN?"+":""}{pc((m.newN-m.oldN)/(m.oldN||1)*100)})</span></td>
            </tr>))}</tbody>
        </table></div>
      </div>}
      {plan.nuevas.length>0&&<div style={{marginBottom:16}}>
        <div className="bold t12" style={{color:C.ink,marginBottom:4}}>Nuevas ({plan.nuevas.length}) · vista previa</div>
        <div className="ovx" style={{maxHeight:200,overflowY:"auto"}}><table className="t11">
          <thead><tr style={{background:C.navy,color:"#fff"}}><th style={{textAlign:"left"}}>Cliente</th><th style={{textAlign:"left"}}>Servicio</th><th>Fecha</th><th style={{textAlign:"right"}}>Neto</th></tr></thead>
          <tbody>{plan.nuevas.slice(0,40).map((m,i)=>(
            <tr key={i} style={{background:i%2?"#fff":C.lgrey}}><td>{m.c}</td><td className="truncate" style={{maxWidth:260}}>{conceptoDe(m.s)}</td><td style={{textAlign:"center"}}>{m.f||"—"}</td><td style={{textAlign:"right"}}>{clp(m.n)}</td></tr>))}</tbody>
        </table>{plan.nuevas.length>40&&<div className="t10" style={{color:C.grey,marginTop:4}}>… y {plan.nuevas.length-40} más</div>}</div>
      </div>}
      <div className="row gap2">
        <button className="btn" onClick={confirmar} style={{background:C.green,color:"#fff",padding:"9px 16px",fontSize:13}}><ICheck/> Confirmar importación</button>
        <button className="btn" onClick={()=>{setPlan(null);setAccept({});}} style={{background:C.lgrey,color:C.ink,padding:"9px 16px",fontSize:13}}><IX/> Cancelar</button>
      </div>
    </div>}

    <div className="card">
      <STitle icon={IDown}>Respaldo de los datos</STitle>
      <div className="t12" style={{color:C.grey,marginBottom:12}}>Descarga todo lo que llevas cargado a un Excel. Guárdalo en tu computador o en la nube: es tu copia de seguridad y también sirve para <b>restaurar</b> (súbelo con “Elegir archivo”) o para migrar a otro dispositivo o a la versión publicada.</div>
      <div className="row wrap gap2">
        <button className="btn" disabled={raw.length===0} onClick={respaldo} style={{background:C.navy,color:"#fff",padding:"9px 16px",fontSize:13}}><IDown/> Descargar respaldo</button>
        <button className="btn" onClick={()=>fileRef.current&&fileRef.current.click()} style={{background:C.lgrey,color:C.navy,padding:"9px 16px",fontSize:13}}><IUp/> Restaurar (subir respaldo)</button>

    </div>
   </div>);
}

const cleanDir=s=>(s||"").replace(/\s+/g," ").trim();
const EXCL_DIR=new Set(["Servicios operacionales (bomba/agua)","Servicios operacionales (electricidad)","Servicios operacionales (riles)","Publicidad vía pública","Ajustes"]);
function PropiedadesTab({props,setProps,rows,notify}){
  const [fCom,setFCom]=useState("todas"),[fEst,setFEst]=useState("todos"),[q,setQ]=useState("");
  const [editing,setEditing]=useState(null); // objeto propiedad en edición
  const [editRol,setEditRol]=useState(null); // rol original (para reemplazar)
  const [plan,setPlan]=useState(null),[accept,setAccept]=useState({});
  const fileRef=useRef(null);

  const comunas=useMemo(()=>[...new Set(props.map(p=>p.comuna))].sort(),[props]);
  const totalAval=props.reduce((a,p)=>a+(+p.avaluo||0),0);
  const nAct=props.filter(p=>p.estado==="Activa").length, nVac=props.length-nAct;

  // direcciones de facturación (propiedades) que generan facturación
  const facDirs=useMemo(()=>{
    const o={}; rows.forEach(r=>{ if(!r.ym&&!r.n)return; if(EXCL_DIR.has(r.direccion))return; if(!r.direccion||r.direccion==="Otros")return;
      o[r.direccion]=(o[r.direccion]||0)+(r.n||0); });
    return Object.entries(o).sort((a,b)=>b[1]-a[1]).map(([d,neto])=>({dir:d,neto}));
  },[rows]);

  const filtered=useMemo(()=>props.filter(p=>
    (fCom==="todas"||p.comuna===fCom)&&(fEst==="todos"||p.estado===fEst)&&
    (!q||(p.rol+" "+p.direccion+" "+p.comuna+" "+p.destino).toLowerCase().includes(q.toLowerCase()))
  ),[props,fCom,fEst,q]);

  const byComuna=useMemo(()=>{ const o={}; filtered.forEach(p=>{ (o[p.comuna]=o[p.comuna]||[]).push(p); });
    return Object.entries(o).sort((a,b)=>a[0].localeCompare(b[0])); },[filtered]);

  const guardar=async(next)=>{ await setProps(next); };
  const linkProp=async(rol,facDir)=>{ const next=props.map(p=>{ if(p.rol===rol) return {...p,link:facDir,estado:"Activa"};
    if(p.link===facDir && p.rol!==rol) return {...p,link:"",estado:"Vacante"}; return p; }); await guardar(next); notify("Propiedad asociada a "+cleanDir(facDir)+"."); };
  const unlink=async(rol)=>{ const next=props.map(p=>p.rol===rol?{...p,link:"",estado:"Vacante"}:p); await guardar(next); };

  const openNew=()=>{ setEditRol(null); setEditing({rol:"",comuna:"",direccion:"",destino:"",avaluo:0,estado:"Vacante",link:"",m2:"",bodegas:"",nota:""}); };
  const saveEdit=async()=>{ if(!editing.rol.trim()){ notify("El ROL es obligatorio.","err"); return; }
    let next; if(editRol){ next=props.map(p=>p.rol===editRol?editing:p); }
    else { if(props.some(p=>p.rol===editing.rol)){ notify("Ya existe una propiedad con ese ROL.","err"); return; } next=[...props,editing]; }
    await guardar(next); setEditing(null); setEditRol(null); notify("Propiedad guardada."); };
  const delProp=async(rol)=>{ await guardar(props.filter(p=>p.rol!==rol)); notify("Propiedad eliminada."); };

  // ---- importar roles ----
  const onFile=async e=>{ const file=e.target.files&&e.target.files[0]; if(!file)return;
    try{ const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
      const arr=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let hi=0; for(let i=0;i<Math.min(arr.length,8);i++){ const j=arr[i].map(x=>String(x).toLowerCase()).join(" "); if(j.includes("rol")||j.includes("aval")){hi=i;break;} }
      const H=arr[hi].map(x=>String(x).toLowerCase().trim()); const find=(...k)=>H.findIndex(h=>k.some(x=>h.includes(x)));
      const iRol=find("rol"),iCom=find("comuna"),iDir=find("direc"),iDes=find("destino"),iAv=find("aval");
      if(iRol<0){ notify("No encuentro la columna ROL.","err"); return; }
      const inc=[];
      for(let i=hi+1;i<arr.length;i++){ const r=arr[i]; if(!r||r.every(x=>x===""||x==null))continue; const rol=String(r[iRol]||"").trim(); if(!rol)continue;
        inc.push({ rol, comuna:iCom>=0?String(r[iCom]||"").trim().replace(/\b\w/g,c=>c.toUpperCase()):"", direccion:iDir>=0?cleanDir(String(r[iDir]||"")):"",
          destino:iDes>=0?String(r[iDes]||"").trim().replace(/\b\w/g,c=>c.toUpperCase()):"", avaluo:iAv>=0?(parseInt(String(r[iAv]).replace(/[^0-9]/g,""))||0):0 }); }
      const byRol={}; props.forEach(p=>byRol[p.rol]=p);
      const nuevas=[],cambios=[]; let iguales=0;
      inc.forEach(x=>{ const ex=byRol[x.rol];
        if(!ex){ nuevas.push(x); }
        else { const dif=(+ex.avaluo!==+x.avaluo)||(cleanDir(ex.direccion)!==x.direccion&&x.direccion)||(ex.destino!==x.destino&&x.destino)||(ex.comuna!==x.comuna&&x.comuna);
          if(dif) cambios.push({rol:x.rol,old:ex,nw:x}); else iguales++; } });
      const ac={}; cambios.forEach(c=>ac[c.rol]=true); setAccept(ac);
      setPlan({nuevas,cambios,iguales,fileName:file.name});
    }catch(err){ notify("Error al leer: "+err.message,"err"); }
    if(fileRef.current)fileRef.current.value="";
  };
  const confirmImport=async()=>{ if(!plan)return; const byRol={}; props.forEach(p=>byRol[p.rol]=p);
    plan.nuevas.forEach(x=>{ byRol[x.rol]={...x,estado:"Vacante",link:"",m2:"",bodegas:"",nota:""}; });
    plan.cambios.forEach(c=>{ if(accept[c.rol]){ const ex=byRol[c.rol]; byRol[c.rol]={...ex,avaluo:c.nw.avaluo,direccion:c.nw.direccion||ex.direccion,destino:c.nw.destino||ex.destino,comuna:c.nw.comuna||ex.comuna}; } });
    await guardar(Object.values(byRol)); notify(`Importado: ${plan.nuevas.length} nuevas, ${Object.values(accept).filter(Boolean).length} actualizadas, ${plan.iguales} iguales.`); setPlan(null); setAccept({}); };

  const estadoColor=e=>e==="Activa"?C.green:(e==="Vacante"?C.grey:C.amber);

  return (
   <div style={{display:"flex",flexDirection:"column",gap:16}}>
    <div className="grid g4">
      <Chip label="Propiedades" value={numCL(props.length)} color={C.navy}/>
      <Chip label="Activas" value={numCL(nAct)} sub="con facturación" color={C.green}/>
      <Chip label="Vacantes" value={numCL(nVac)} sub="sin facturación" color={C.grey}/>
      <Chip label="Avalúo fiscal total" value={clp(totalAval)} color={C.orange}/>
    </div>

    {/* Cruce con facturación */}
    <div className="card">
      <STitle icon={ILayers}>Cruce con facturación · asociar propiedades</STitle>
      <div className="t11" style={{color:C.grey,marginBottom:8}}>Cada dirección que genera facturación debe estar asociada a una propiedad (por ROL). Las dudosas quedan para que confirmes la unión.</div>
      <div className="ovx"><table className="t11">
        <thead><tr style={{background:C.navy,color:"#fff"}}><th style={{textAlign:"left"}}>Dirección facturada</th><th style={{textAlign:"right"}}>Neto</th><th style={{textAlign:"left"}}>Propiedad asociada (ROL)</th></tr></thead>
        <tbody>{facDirs.map((fd,i)=>{ const linked=props.find(p=>p.link===fd.dir);
          const suger=[...props].map(p=>({p,s:simil(fd.dir,p.direccion+" "+p.comuna)})).sort((a,b)=>b.s-a.s).filter(x=>x.s>0).slice(0,6);
          return (
          <tr key={fd.dir} style={{background:i%2?"#fff":C.lgrey}}>
            <td className="semib">{cleanDir(fd.dir)}</td>
            <td style={{textAlign:"right"}}>{clp(fd.neto)}</td>
            <td>
              {linked
                ? <span className="row gap2"><span style={{color:C.green}}>✓ {linked.rol} · {cleanDir(linked.direccion).slice(0,28)}</span>
                    <button className="btn t10" onClick={()=>unlink(linked.rol)} style={{background:C.lgrey,color:C.red,padding:"2px 6px"}}>quitar</button></span>
                : <select value="" onChange={e=>e.target.value&&linkProp(e.target.value,fd.dir)} style={{fontSize:11,padding:"3px 6px",borderRadius:6,border:`1px solid ${C.amber}`,color:C.ink,maxWidth:280}}>
                    <option value="">⚠ Asociar a una propiedad…</option>
                    {suger.map(({p,s})=><option key={p.rol} value={p.rol}>{s>=0.3?"★ ":""}{p.rol} · {cleanDir(p.direccion).slice(0,32)} ({p.comuna})</option>)}
                    <option disabled>──────────</option>
                    {props.filter(p=>!suger.some(x=>x.p.rol===p.rol)).map(p=><option key={p.rol} value={p.rol}>{p.rol} · {cleanDir(p.direccion).slice(0,32)}</option>)}
                  </select>}
            </td>
          </tr>); })}</tbody>
      </table></div>
    </div>

    {/* Filtros + acciones */}
    <div className="card">
      <div className="row wrap gap2">
        <IFilter color={C.grey}/>
        <Select label="Comuna" value={fCom} onChange={setFCom} options={[["todas","Todas"],...comunas.map(c=>[c,c])]}/>
        <Select label="Estado" value={fEst} onChange={setFEst} options={[["todos","Todos"],["Activa","Activa"],["Vacante","Vacante"]]}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar rol/dirección…" style={{fontSize:12,padding:"5px 8px",borderRadius:6,border:`1px solid ${C.line}`,minWidth:160}}/>
        <div className="flex1"/>
        <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{display:"none"}}/>
        <button className="btn t12" onClick={()=>fileRef.current&&fileRef.current.click()} style={{background:C.lgrey,color:C.navy,padding:"6px 12px"}}><IUp size={14}/> Importar roles</button>
        <button className="btn t12" onClick={openNew} style={{background:C.orange,color:"#fff",padding:"6px 12px"}}>+ Agregar propiedad</button>
      </div>
    </div>

    {/* Revisión de importación de roles */}
    {plan&&<div className="card">
      <STitle icon={IRefresh}>Revisión de importación de roles · {plan.fileName}</STitle>
      <div className="grid g3" style={{marginBottom:12}}>
        <Chip label="Nuevas" value={numCL(plan.nuevas.length)} sub="se agregan" color={C.green}/>
        <Chip label="Con cambios" value={numCL(plan.cambios.length)} sub="requieren tu ok" color={C.amber}/>
        <Chip label="Iguales" value={numCL(plan.iguales)} sub="se ignoran" color={C.grey}/>
      </div>
      {plan.cambios.length>0&&<div className="ovx" style={{maxHeight:240,overflowY:"auto",marginBottom:12}}><table className="t11">
        <thead><tr style={{background:C.navy,color:"#fff"}}><th>Ok</th><th style={{textAlign:"left"}}>ROL</th><th style={{textAlign:"right"}}>Avalúo antes → después</th></tr></thead>
        <tbody>{plan.cambios.map((c,i)=>(<tr key={c.rol} style={{background:i%2?"#fff":C.lgrey}}>
          <td style={{textAlign:"center"}}><input type="checkbox" checked={!!accept[c.rol]} onChange={e=>setAccept(a=>({...a,[c.rol]:e.target.checked}))}/></td>
          <td>{c.rol}</td><td style={{textAlign:"right"}}><span style={{color:C.grey}}>{clp(c.old.avaluo)}</span><span style={{color:C.orange}}> → {clp(c.nw.avaluo)}</span></td>
        </tr>))}</tbody></table></div>}
      <div className="row gap2">
        <button className="btn" onClick={confirmImport} style={{background:C.green,color:"#fff",padding:"8px 14px",fontSize:13}}><ICheck/> Confirmar</button>
        <button className="btn" onClick={()=>{setPlan(null);setAccept({});}} style={{background:C.lgrey,color:C.ink,padding:"8px 14px",fontSize:13}}><IX/> Cancelar</button>
      </div>
    </div>}

    {/* Listado por comuna */}
    {byComuna.map(([com,list])=>(
      <div className="card" key={com}>
        <STitle icon={IPin}>{com} · {list.length} propiedad(es) · avalúo {clp(list.reduce((a,p)=>a+(+p.avaluo||0),0))}</STitle>
        <div className="ovx"><table className="t11">
          <thead><tr style={{background:C.navy,color:"#fff"}}>
            <th style={{textAlign:"left"}}>ROL</th><th style={{textAlign:"left"}}>Dirección</th><th style={{textAlign:"left"}}>Destino</th>
            <th style={{textAlign:"right"}}>Avalúo fiscal</th><th style={{textAlign:"left"}}>Estado</th><th style={{textAlign:"left"}}>Facturación</th><th></th></tr></thead>
          <tbody>{list.map((p,i)=>(
            <tr key={p.rol} style={{background:i%2?"#fff":C.lgrey}}>
              <td className="semib">{p.rol}</td>
              <td>{cleanDir(p.direccion)}</td>
              <td>{p.destino}</td>
              <td style={{textAlign:"right"}}>{clp(p.avaluo)}</td>
              <td><span style={{color:estadoColor(p.estado),fontWeight:600}}>● {p.estado}</span></td>
              <td className="t10" style={{color:C.grey}}>{p.link?cleanDir(p.link).slice(0,26):"—"}</td>
              <td style={{whiteSpace:"nowrap"}}>
                <button className="btn t10" onClick={()=>{setEditRol(p.rol);setEditing({...p});}} style={{background:C.lgrey,color:C.navy,padding:"2px 8px",marginRight:4}}>Editar</button>
                <button className="btn t10" onClick={()=>{ if(confirm("¿Eliminar la propiedad "+p.rol+"?")) delProp(p.rol); }} style={{background:"#fff",color:C.red,border:`1px solid ${C.line}`,padding:"2px 8px"}}>✕</button>
              </td>
            </tr>))}</tbody>
        </table></div>
      </div>))}
    {byComuna.length===0&&<div className="card"><div className="t12" style={{color:C.grey,textAlign:"center",padding:12}}>No hay propiedades con esos filtros.</div></div>}

    {/* Modal edición */}
    {editing&&<div style={{position:"fixed",inset:0,background:"rgba(27,42,74,.45)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:50}}>
      <div className="card" style={{maxWidth:460,width:"100%",maxHeight:"90vh",overflowY:"auto"}}>
        <div className="bold t14" style={{color:C.ink,marginBottom:10}}>{editRol?"Editar propiedad":"Nueva propiedad"}</div>
        {[["ROL","rol"],["Comuna","comuna"],["Dirección","direccion"],["Destino","destino"]].map(([lb,k])=>(
          <label key={k} className="t11" style={{display:"block",marginBottom:8}}><span className="semib" style={{color:C.grey}}>{lb}</span>
            <input value={editing[k]||""} onChange={e=>setEditing({...editing,[k]:e.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}/></label>))}
        <div className="row gap2">
          <label className="t11 flex1"><span className="semib" style={{color:C.grey}}>Avalúo fiscal</span>
            <input type="number" value={editing.avaluo||0} onChange={e=>setEditing({...editing,avaluo:+e.target.value||0})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}/></label>
          <label className="t11 flex1"><span className="semib" style={{color:C.grey}}>Estado</span>
            <select value={editing.estado} onChange={e=>setEditing({...editing,estado:e.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}>
              {["Vacante","Activa","En venta","En desarrollo"].map(s=><option key={s}>{s}</option>)}</select></label>
        </div>
        <div className="row gap2" style={{marginTop:8}}>
          <label className="t11 flex1"><span className="semib" style={{color:C.grey}}>m² (opcional)</span>
            <input value={editing.m2||""} onChange={e=>setEditing({...editing,m2:e.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}/></label>
          <label className="t11 flex1"><span className="semib" style={{color:C.grey}}>N° bodegas (opcional)</span>
            <input value={editing.bodegas||""} onChange={e=>setEditing({...editing,bodegas:e.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}/></label>
        </div>
        <label className="t11" style={{display:"block",marginTop:8}}><span className="semib" style={{color:C.grey}}>Facturación asociada</span>
          <select value={editing.link||""} onChange={e=>setEditing({...editing,link:e.target.value,estado:e.target.value?"Activa":editing.estado})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}>
            <option value="">— Sin asociar —</option>{facDirs.map(fd=><option key={fd.dir} value={fd.dir}>{cleanDir(fd.dir)}</option>)}</select></label>
        <label className="t11" style={{display:"block",marginTop:8}}><span className="semib" style={{color:C.grey}}>Nota</span>
          <input value={editing.nota||""} onChange={e=>setEditing({...editing,nota:e.target.value})} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:`1px solid ${C.line}`,fontSize:13,marginTop:2}}/></label>
        <div className="row gap2" style={{marginTop:14}}>
          <button className="btn" onClick={saveEdit} style={{background:C.green,color:"#fff",padding:"8px 14px",fontSize:13}}><ICheck/> Guardar</button>
          <button className="btn" onClick={()=>{setEditing(null);setEditRol(null);}} style={{background:C.lgrey,color:C.ink,padding:"8px 14px",fontSize:13}}>Cancelar</button>
        </div>
      </div>
    </div>}
   </div>);
}

function Panel(){
  const [raw,setRawState]=useState([]);
  const [cap,setCapState]=useState(45);
  const [props,setPropsState]=useState([]);
  const [tab,setTab]=useState("resumen");
  const [toast,setToast]=useState(null);
  const [mode,setMode]=useState("cargando…");
  const [ready,setReady]=useState(false);
  const rawRef=useRef([]), capRef=useRef(45), propsRef=useRef([]);
  const rows=useMemo(()=>enrich(raw),[raw]);
  const notify=(m,t="ok")=>{ setToast({t,m}); setTimeout(()=>setToast(null),4000); };
  const setRows=useCallback(async next=>{ setRawState(next); rawRef.current=next; const ok=await saveState(next,capRef.current,propsRef.current); if(!ok) notify("No se pudo guardar en la nube. Revisa la conexión.","err"); },[]);
  const setCap=useCallback(async v=>{ setCapState(v); capRef.current=v; await saveState(rawRef.current,v,propsRef.current); },[]);
  const setProps=useCallback(async next=>{ setPropsState(next); propsRef.current=next; const ok=await saveState(rawRef.current,capRef.current,next); if(!ok) notify("No se pudo guardar en la nube.","err"); },[]);
  const refresh=useCallback(async()=>{ const st=await loadState(); setRawState(st.rows); setCapState(st.cap); const pr=st.props||PROPS_SEED; setPropsState(pr); rawRef.current=st.rows; capRef.current=st.cap; propsRef.current=pr; setMode(modeLabel()); notify("Datos actualizados."); },[]);
  useEffect(()=>{ (async()=>{ const st=await loadState(); const pr=(st.props&&st.props.length)?st.props:PROPS_SEED;
    setRawState(st.rows); setCapState(st.cap); setPropsState(pr); rawRef.current=st.rows; capRef.current=st.cap; propsRef.current=pr;
    setMode(modeLabel()); setReady(true);
    if(!(st.props&&st.props.length)){ try{ await saveState(st.rows,st.cap,pr); }catch(e){} } })(); },[]);
  const empty=rows.length===0;
  const TABS=[["resumen","Resumen general",IDash],["ocup","Ocupación Huechuraba",IWare],["resto","El resto",ILayers],["props","Propiedades",IBuild],["import","Importación",IDb]];
  if(!ready) return <div style={{padding:40,textAlign:"center",color:C.grey}}>Cargando…</div>;
  return (
   <div>
    <div style={{background:C.navy,padding:"14px 20px 0"}}>
      <div className="row wrap" style={{justifyContent:"space-between"}}>
        <div>
          <div className="bold" style={{color:"#fff",fontSize:16}}>Estado de Facturación · Panel</div>
          <div className="t11" style={{color:"#B8C4DC"}}>{empty?"Sin datos cargados":`${numCL(rows.length)} documentos · ${new Set(rows.map(r=>r.c)).size} clientes`} · {mode}</div>
        </div>
        <button className="btn t11" onClick={refresh} style={{background:"rgba(255,255,255,.12)",color:"#fff",padding:"6px 10px",alignSelf:"center"}}><IRefresh size={13}/> Actualizar</button>
      </div>
      <div className="row gap1" style={{marginTop:12,overflowX:"auto"}}>
        {TABS.map(([id,label,I])=>{ const on=tab===id; return (
          <button key={id} className="tabbtn" onClick={()=>setTab(id)} style={{background:on?C.paper:"transparent",color:on?C.navy:"#C3CDE0"}}><I size={14}/>{label}</button>); })}
      </div>
    </div>
    <div style={{height:3,background:C.orange}}/>
    {toast&&<div className="row gap2 t12" style={{margin:"12px 20px 0",padding:"8px 12px",borderRadius:8,background:toast.t==="err"?"#FDECEA":"#E9F6EF",color:toast.t==="err"?C.red:C.greenD}}>{toast.t==="err"?<IWarn size={14}/>:<ICheck size={14}/>}{toast.m}</div>}
    <div style={{padding:20}}>
      {empty&&tab!=="import"&&tab!=="props"
        ? <div style={{textAlign:"center",padding:"60px 0"}}>
            <div style={{display:"inline-flex",width:56,height:56,borderRadius:28,background:C.lgrey,alignItems:"center",justifyContent:"center",marginBottom:12}}><IUp color={C.orange} size={22}/></div>
            <div className="bold" style={{fontSize:16,color:C.ink}}>Aún no hay datos</div>
            <div className="t13" style={{color:C.grey,margin:"4px 0 16px"}}>Importa tu planilla de facturación para empezar.</div>
            <button className="btn" onClick={()=>setTab("import")} style={{background:C.orange,color:"#fff",padding:"9px 16px",fontSize:13}}>Ir a Importación</button>
          </div>
        : tab==="resumen"?<ResumenTab rows={rows}/>
        : tab==="ocup"?<OcupTab rows={rows} cap={cap} setCap={setCap}/>
        : tab==="resto"?<RestoTab rows={rows}/>
        : tab==="props"?<PropiedadesTab props={props} setProps={setProps} rows={rows} notify={notify}/>
        : <ImportTab raw={raw} enriched={rows} setRows={setRows} notify={notify} mode={mode}/>}
    </div>
    <div className="t10" style={{padding:"0 20px 20px",color:C.grey}}>Comuna · dirección · tipo se derivan de la glosa. Gastos comunes → Huechuraba. Servicios (bomba/luz/riles) heredan la comuna del arriendo del cliente. Corderos y terneros → Santo Domingo.</div>
   </div>);
}

/* ===== Error boundary + montaje ===== */
class Boundary extends React.Component{
  constructor(p){super(p);this.state={e:null};}
  static getDerivedStateFromError(e){return {e};}
  render(){ if(this.state.e) return <div style={{padding:24,fontFamily:"system-ui"}}>
      <div style={{fontWeight:700,color:C.red,fontSize:15}}>Ocurrió un error al mostrar el panel</div>
      <div style={{color:C.ink,fontSize:13,margin:"8px 0"}}>{String(this.state.e&&this.state.e.message||this.state.e)}</div>
      <button className="btn" onClick={()=>location.reload()} style={{background:C.navy,color:"#fff",padding:"8px 14px"}}>Recargar</button>
    </div>;
    return this.props.children; }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><Panel/></Boundary>);
</script>
